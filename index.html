<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Киношки</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

    <section class="hero">

  <div class="hero-overlay"></div>

  <div class="hero-content">

    <p class="hero-tag">
      Смотрите прямо сейчас!
    </p>

    <h2 id="heroTitle">
      Interstellar
    </h2>

    <p id="heroDescription">
      Космическая экспедиция ради спасения человечества.
    </p>

    <button id="heroBtn">
      Смотреть сейчас
    </button>

  </div>

</section>
  <header class="header">
    <h1>🎬 Киношки</h1>

    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Найти фильм...">
      <button id="searchBtn">Поиск</button>
    </div>
  </header>

  <main>
    <h2 class="section-title">
  ❤️ Избранное
</h2>

<div
  class="movies-container"
  id="favoritesContainer"
></div>

<h2 class="section-title">
  🎬 Фильмы
</h2>
    <div class="movies-container" id="moviesContainer"></div>
  </main>

  <div class="modal hidden" id="movieModal">
    <div class="modal-content">

      <span class="close-btn" id="closeModal">&times;</span>

      <img id="modalPoster" src="" alt="">

      <div class="modal-info">
        <h2 id="modalTitle"></h2>

        <p><b>Год:</b> <span id="modalYear"></span></p>

        <p><b>Рейтинг:</b> ⭐ <span id="modalRating"></span></p>

        <p><b>Жанр:</b> <span id="modalGenre"></span></p>

        <p><b>Описание:</b></p>
        <p id="modalPlot"></p>

      </div>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
